version: "3.8"

services:
  kali-wireless:
    build:
      context: .
      dockerfile: Dockerfile
    image: kali-wireless:local
    container_name: kali-wireless
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ${HOME}/stashes/wargames/kali:/work
    working_dir: /work
    stdin_open: true
    tty: true
    command: /bin/bash

  # If USB access fails, use this service instead (more permissive):
  # kali-wireless-privileged:
  #   image: kalilinux/kali-rolling
  #   container_name: kali-wireless-privileged
  #   network_mode: host
  #   privileged: true
  #   volumes:
  #     - ${HOME}/stashes/wargames/kali:/work
  #   working_dir: /work
  #   stdin_open: true
  #   tty: true
  #   command: /bin/bash
